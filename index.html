<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>咬不动地鼠</title>
<style>
  :root {
    --bg0:#070810;
    --bg1:#111827;
    --panel:#151a28;
    --panel2:#1d2535;
    --card:#121724;
    --text:#fff4da;
    --muted:#b8ae9b;
    --accent:#ffbd46;
    --accent2:#ff6f73;
    --earth0:#2a1b13;
    --earth1:#553725;
    --earth2:#a5754d;
    --rim:#c49360;
    --green:#87b55a;
    --shadow:0 20px 64px rgba(0,0,0,.42);
    --radius:28px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    margin:0;
    color:var(--text);
    font-family: ui-rounded, "SF Pro Rounded", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, Segoe UI, sans-serif;
    background:
      radial-gradient(circle at 78% -7%, rgba(255,107,109,.28), transparent 34%),
      radial-gradient(circle at 8% 9%, rgba(255,203,94,.18), transparent 28%),
      linear-gradient(180deg, #070810 0%, #111827 52%, #070810 100%);
    overflow:hidden;
    touch-action:manipulation;
    user-select:none;
  }
  button, input { font:inherit; }
  button { cursor:pointer; }
  .app {
    width:min(100vw, 620px);
    height:100dvh;
    margin:0 auto;
    padding:max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .topbar {
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
    flex:0 0 auto;
  }
  .brand { min-width:0; }
  h1 {
    margin:0;
    font-size:clamp(24px, 7.2vw, 38px);
    line-height:.95;
    letter-spacing:.02em;
    font-weight:950;
    color:#fff2cf;
    text-shadow:0 4px 0 rgba(0,0,0,.28), 0 0 26px rgba(255,189,70,.18);
  }
  .sub {
    margin:6px 0 0;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .top-actions { display:flex; gap:7px; align-items:center; }
  .tiny-btn, .mode-chip, .ghost-btn {
    appearance:none;
    border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.025)), #182033;
    color:var(--text);
    border-radius:999px;
    min-height:38px;
    padding:0 12px;
    font-size:12px;
    font-weight:850;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 8px 20px rgba(0,0,0,.22);
  }
  .tiny-btn:active, .mode-chip:active, .ghost-btn:active { transform:translateY(1px) scale(.985); }
  .tipbar {
    position:relative;
    flex:0 0 auto;
    min-height:34px;
    border-radius:17px;
    padding:8px 12px 8px 34px;
    background:linear-gradient(90deg, rgba(255,189,70,.16), rgba(255,255,255,.035));
    border:1px solid rgba(255,255,255,.07);
    color:#f6e4c6;
    font-size:12px;
    overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  }
  .tipbar::before {
    content:"";
    position:absolute;
    left:12px; top:50%;
    width:10px; height:10px;
    border-radius:999px;
    transform:translateY(-50%);
    background:var(--accent);
    box-shadow:0 0 16px rgba(255,189,70,.7);
  }
  .hud {
    flex:0 0 auto;
    display:grid;
    grid-template-columns:1.15fr .92fr .92fr .86fr;
    gap:7px;
  }
  .stat {
    position:relative;
    overflow:hidden;
    min-height:62px;
    padding:9px 10px;
    border-radius:19px;
    background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.018)), var(--panel);
    border:1px solid rgba(255,255,255,.065);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 9px 22px rgba(0,0,0,.18);
  }
  .stat::after {
    content:"";
    position:absolute;
    right:-22px; bottom:-34px;
    width:76px; height:76px;
    border-radius:50%;
    background:rgba(255,189,70,.07);
  }
  .label { display:block; color:var(--muted); font-size:10px; letter-spacing:.06em; }
  .value { display:block; margin-top:4px; font-size:clamp(19px, 5.4vw, 29px); line-height:1; font-weight:950; }
  .combo-hot .value { color:#ffe07b; text-shadow:0 0 18px rgba(255,224,123,.34); }
  .timebar {
    flex:0 0 auto;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    box-shadow:inset 0 1px 4px rgba(0,0,0,.45);
  }
  .timebar > i {
    display:block;
    width:100%; height:100%;
    transform-origin:left center;
    background:linear-gradient(90deg, #ffe28a, #ffbd46 55%, #ff6f73 100%);
    border-radius:inherit;
    transition:transform .12s linear;
  }
  .stage-card {
    position:relative;
    flex:1 1 auto;
    min-height:0;
    border-radius:var(--radius);
    padding:clamp(9px, 2.4vmin, 16px);
    background:
      radial-gradient(circle at 50% -8%, rgba(255,189,70,.13), transparent 40%),
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.014)),
      #101623;
    border:1px solid rgba(255,255,255,.075);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.07);
    overflow:hidden;
  }
  .stage-card::before {
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    opacity:.42;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1.8px),
      radial-gradient(circle, rgba(255,222,128,.12) 1.4px, transparent 2.2px);
    background-size:46px 46px, 72px 72px;
    background-position:0 8px, 23px 19px;
  }
  .stage-card.fever {
    box-shadow:0 0 0 1px rgba(255,216,96,.18), 0 24px 76px rgba(255,111,115,.14), var(--shadow);
  }
  .field {
    position:relative;
    z-index:1;
    height:100%;
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    grid-template-rows:repeat(3, minmax(0,1fr));
    gap:clamp(6px, 2.2vmin, 13px);
  }
  .hole {
    position:relative;
    min-width:0;
    min-height:0;
    appearance:none;
    border:0;
    padding:0;
    background:transparent;
    border-radius:24px;
    transform:translateZ(0);
    touch-action:manipulation;
  }
  .hole:focus-visible { outline:3px solid rgba(255,222,128,.78); outline-offset:2px; }
  .hole .halo {
    position:absolute;
    left:12%; right:12%; bottom:8%;
    height:45%;
    border-radius:50%;
    background:radial-gradient(ellipse at 50% 50%, rgba(255,199,96,.22), transparent 68%);
    opacity:0;
    transform:scale(.8);
    transition:opacity .18s ease, transform .18s ease;
    pointer-events:none;
  }
  .hole.bonus .halo, .hole.up .halo { opacity:.9; transform:scale(1); }
  .hole.bonus .halo { background:radial-gradient(ellipse at 50% 50%, rgba(255,222,105,.42), transparent 70%); animation:pulseGold .75s ease-in-out infinite alternate; }
  @keyframes pulseGold { from { filter:brightness(1); } to { filter:brightness(1.35); } }
  .well {
    position:absolute;
    z-index:1;
    left:4%; right:4%; bottom:5%;
    height:42%;
    border-radius:50% 50% 45% 45%;
    background:
      radial-gradient(ellipse at 50% 37%, #050405 0 39%, rgba(23,14,11,.99) 41% 57%, transparent 58%),
      radial-gradient(ellipse at 50% 74%, #d59a62 0 11%, #98653e 38%, #4c3022 72%, #241711 100%);
    box-shadow:
      inset 0 16px 19px rgba(0,0,0,.58),
      inset 0 -7px 0 rgba(255,238,184,.08),
      0 8px 0 rgba(0,0,0,.28),
      0 14px 20px rgba(0,0,0,.24);
  }
  .well::before {
    content:"";
    position:absolute;
    left:7%; right:7%; top:8%; height:36%;
    border-radius:50%;
    background:linear-gradient(180deg, rgba(255,241,202,.22), rgba(255,255,255,0));
    filter:blur(1.8px);
  }
  .well::after {
    content:"";
    position:absolute;
    left:11%; right:11%; bottom:8%; height:18%;
    border-radius:50%;
    background:rgba(47,29,20,.5);
  }
  .grass {
    position:absolute;
    z-index:2;
    left:7%; right:7%; bottom:3%; height:24%;
    border-radius:46% 46% 42% 42%;
    background:
      radial-gradient(ellipse at 19% 34%, rgba(255,239,184,.25) 0 13%, transparent 14%),
      radial-gradient(ellipse at 76% 36%, rgba(255,239,184,.18) 0 11%, transparent 12%),
      linear-gradient(180deg, #b98252 0%, #68452f 52%, #34241d 100%);
    box-shadow:inset 0 7px 0 rgba(255,255,255,.08), 0 -5px 10px rgba(0,0,0,.22);
    pointer-events:none;
  }
  .grass i {
    position:absolute;
    bottom:66%;
    width:18%; height:38%;
    border-radius:90% 90% 12% 12%;
    background:linear-gradient(180deg, #8abd61, #4f7437);
    transform-origin:bottom center;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.18));
  }
  .grass i:nth-child(1){ left:7%; transform:rotate(-24deg); }
  .grass i:nth-child(2){ left:20%; height:46%; transform:rotate(8deg); }
  .grass i:nth-child(3){ right:13%; transform:rotate(23deg); }
  .mole {
    position:absolute;
    z-index:3;
    left:50%; bottom:14%;
    width:112%; max-width:none;
    opacity:0;
    transform:translate(-50%, 74%) scale(.84);
    transform-origin:50% 79%;
    transition:transform .18s cubic-bezier(.18,.88,.22,1.18), opacity .1s ease;
    filter:drop-shadow(0 9px 4px rgba(0,0,0,.35));
    image-rendering:auto;
    pointer-events:none;
    -webkit-user-drag:none;
  }
  .hole.peek .mole { opacity:1; transform:translate(-50%, 42%) scale(.93); }
  .hole.up .mole { opacity:1; transform:translate(-50%, 9%) scale(1); }
  .hole.hit .mole { animation:bonk .36s cubic-bezier(.2,.7,.2,1) both; }
  .hole.sink .mole { opacity:1; transform:translate(-50%, 72%) scale(.86); }
  @keyframes bonk {
    0% { transform:translate(-50%, 7%) rotate(0deg) scale(1); }
    25% { transform:translate(-50%, -5%) rotate(-7deg) scale(1.06); }
    58% { transform:translate(-50%, 14%) rotate(6deg) scale(.98); }
    100% { transform:translate(-50%, 34%) rotate(0deg) scale(.9); }
  }
  .impact {
    position:absolute;
    z-index:5;
    left:50%; top:27%;
    width:min(58%, 92px);
    aspect-ratio:1;
    opacity:0;
    transform:translate(-50%, -50%) scale(.2);
    pointer-events:none;
    background:
      conic-gradient(from 0deg, transparent 0 8%, rgba(255,222,90,.98) 8% 14%, transparent 14% 25%, rgba(255,116,115,.95) 25% 31%, transparent 31% 44%, rgba(255,245,196,.95) 44% 50%, transparent 50% 64%, rgba(255,222,90,.95) 64% 71%, transparent 71% 100%);
    clip-path:polygon(50% 0%,61% 33%,94% 18%,69% 48%,100% 60%,64% 62%,75% 98%,50% 70%,24% 98%,35% 62%,0 60%,31% 48%,6% 18%,40% 33%);
    filter:drop-shadow(0 2px 7px rgba(0,0,0,.45));
  }
  .hole.hit .impact { animation:burst .36s ease-out both; }
  @keyframes burst {
    0% { opacity:0; transform:translate(-50%, -50%) scale(.18) rotate(-20deg); }
    38% { opacity:1; transform:translate(-50%, -50%) scale(1) rotate(7deg); }
    100% { opacity:0; transform:translate(-50%, -50%) scale(1.32) rotate(18deg); }
  }
  .points {
    position:absolute;
    z-index:6;
    left:50%; top:14%;
    transform:translate(-50%, 0);
    padding:5px 9px;
    border-radius:999px;
    min-width:46px;
    background:rgba(255,222,105,.96);
    color:#2d1c0d;
    font-size:12px;
    font-weight:950;
    opacity:0;
    pointer-events:none;
    box-shadow:0 9px 18px rgba(0,0,0,.26);
    white-space:nowrap;
  }
  .points.crit { background:#ff787b; color:white; text-shadow:0 1px 0 rgba(0,0,0,.18); }
  .points.combo { background:#fff0b8; }
  .points.show { animation:floatScore .74s ease-out both; }
  @keyframes floatScore {
    0% { opacity:0; transform:translate(-50%, 9px) scale(.75); }
    18% { opacity:1; transform:translate(-50%, -2px) scale(1); }
    100% { opacity:0; transform:translate(-50%, -38px) scale(.92); }
  }
  .stage-msg, .countdown {
    position:absolute;
    z-index:8;
    left:50%; top:50%;
    transform:translate(-50%, -50%);
    pointer-events:none;
    text-align:center;
    font-weight:950;
    text-shadow:0 4px 16px rgba(0,0,0,.55);
  }
  .stage-msg {
    min-width:160px;
    padding:11px 15px;
    border-radius:999px;
    background:rgba(16,20,30,.72);
    border:1px solid rgba(255,255,255,.12);
    color:#ffe6a6;
    opacity:0;
    transform:translate(-50%, -50%) scale(.9);
  }
  .stage-msg.show { animation:centerPop .86s ease both; }
  @keyframes centerPop {
    0% { opacity:0; transform:translate(-50%, -48%) scale(.84); }
    22% { opacity:1; transform:translate(-50%, -50%) scale(1.03); }
    75% { opacity:1; transform:translate(-50%, -50%) scale(1); }
    100% { opacity:0; transform:translate(-50%, -55%) scale(.95); }
  }
  .countdown {
    display:none;
    font-size:clamp(54px, 19vw, 104px);
    color:#fff1c7;
  }
  .countdown.show { display:block; animation:countPop .58s ease both; }
  @keyframes countPop { from { opacity:0; transform:translate(-50%, -50%) scale(.72); } to { opacity:1; transform:translate(-50%, -50%) scale(1); } }
  .controls {
    flex:0 0 auto;
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:8px;
    align-items:center;
  }
  .start {
    appearance:none;
    border:0;
    min-height:52px;
    border-radius:20px;
    padding:0 18px;
    color:#2d1908;
    background:linear-gradient(180deg, #fff0b6 0%, #ffbd46 70%, #ec902c 100%);
    box-shadow:0 15px 30px rgba(255,144,44,.25), inset 0 1px 0 rgba(255,255,255,.72);
    font-size:16px;
    font-weight:950;
  }
  .start:active { transform:translateY(1px) scale(.995); }
  .ghost-btn { min-height:52px; border-radius:20px; padding:0 14px; font-size:13px; }
  .curtain {
    position:fixed;
    inset:0;
    z-index:20;
    display:grid;
    place-items:center;
    padding:18px;
    background:rgba(4,5,10,.64);
    backdrop-filter:blur(10px);
  }
  .curtain.hidden { display:none; }
  .card {
    width:min(94vw, 455px);
    max-height:calc(100dvh - 36px);
    overflow:auto;
    border-radius:30px;
    padding:20px;
    background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.028)), #141a29;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 28px 90px rgba(0,0,0,.52), inset 0 1px 0 rgba(255,255,255,.09);
  }
  .card h2 { margin:0; font-size:28px; color:#fff0c9; }
  .card p { margin:10px 0 0; color:#d8cfbd; line-height:1.62; font-size:14px; }
  .preview {
    display:flex;
    align-items:flex-end;
    justify-content:center;
    height:118px;
    margin:12px 0;
    border-radius:24px;
    background:radial-gradient(ellipse at 50% 83%, #050507 0 30%, rgba(255,189,70,.12) 31% 64%, transparent 65%), linear-gradient(180deg, rgba(255,255,255,.026), rgba(255,255,255,.05));
    overflow:hidden;
  }
  .preview img { height:142px; transform:translateY(18px); filter:drop-shadow(0 12px 5px rgba(0,0,0,.36)); user-select:none; -webkit-user-drag:none; }
  .diff-grid {
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:8px;
    margin-top:12px;
  }
  .diff-card {
    text-align:left;
    appearance:none;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:11px;
    background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)), #192033;
    color:var(--text);
  }
  .diff-card b { display:block; font-size:15px; }
  .diff-card span { display:block; margin-top:5px; font-size:11px; line-height:1.35; color:#cfc4af; }
  .diff-card.active {
    border-color:rgba(255,201,89,.72);
    box-shadow:0 0 0 2px rgba(255,201,89,.12), inset 0 1px 0 rgba(255,255,255,.08);
    background:linear-gradient(180deg, rgba(255,189,70,.18), rgba(255,255,255,.025)), #1b2235;
  }
  .result-grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-top:12px;
  }
  .result-grid div {
    border-radius:16px;
    padding:9px 8px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.06);
  }
  .result-grid small { display:block; color:var(--muted); font-size:10px; }
  .result-grid strong { display:block; margin-top:2px; font-size:18px; }
  .card .start { width:100%; margin-top:14px; }
  .hammer {
    position:fixed;
    left:0; top:0;
    width:58px; height:58px;
    pointer-events:none;
    z-index:30;
    opacity:0;
    transform:translate(-90px,-90px) rotate(-28deg);
    transition:opacity .12s ease, transform .05s linear;
  }
  .hammer.show { opacity:1; }
  .hammer::before {
    content:"";
    position:absolute;
    left:16px; top:5px;
    width:27px; height:37px;
    border-radius:9px;
    background:linear-gradient(90deg, #c5b19b, #f4dfc1 52%, #9b816b);
    box-shadow:inset 0 0 0 3px rgba(0,0,0,.15), 0 5px 11px rgba(0,0,0,.3);
    transform:rotate(44deg);
  }
  .hammer::after {
    content:"";
    position:absolute;
    left:18px; top:30px;
    width:12px; height:35px;
    border-radius:8px;
    background:linear-gradient(180deg, #80573a, #4f3222);
    transform:rotate(44deg);
    transform-origin:50% 0;
  }
  .hammer.strike { animation:hammerHit .18s ease-out both; }
  @keyframes hammerHit {
    0% { transform:translate(var(--x), var(--y)) rotate(-28deg) scale(1); }
    54% { transform:translate(var(--x), var(--y)) rotate(11deg) scale(.98); }
    100% { transform:translate(var(--x), var(--y)) rotate(-22deg) scale(1); }
  }
  .shake { animation:boardShake .2s ease-out; }
  @keyframes boardShake {
    0%,100% { transform:translateX(0); }
    25% { transform:translateX(-5px); }
    70% { transform:translateX(4px); }
  }
  @media (max-width:390px) {
    .app { padding-left:10px; padding-right:10px; gap:8px; }
    .hud { gap:6px; }
    .stat { min-height:58px; padding:8px 8px; border-radius:17px; }
    .label { font-size:9px; }
    .ghost-btn { padding:0 11px; }
    .tiny-btn { padding:0 10px; }
  }
  @media (max-height:720px) and (max-width:520px) {
    .sub { display:none; }
    .tipbar { min-height:30px; padding-top:6px; padding-bottom:6px; }
    .stat { min-height:54px; }
    .controls .ghost-btn, .controls .start { min-height:48px; }
    .preview { display:none; }
  }
  @media (min-width:700px) {
    body { overflow:auto; }
    .app { min-height:100dvh; height:auto; }
    .stage-card { min-height:560px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>咬不动地鼠</h1>
      <p id="subtitle" class="sub">暴击、连击、热潮，角色会认真挨打。</p>
    </div>
    <div class="top-actions">
      <button id="soundBtn" class="tiny-btn" aria-label="切换音效">音效开</button>
      <button id="fullBtn" class="tiny-btn" aria-label="切换全屏">全屏</button>
      <button id="pauseBtn" class="tiny-btn" aria-label="暂停游戏">暂停</button>
    </div>
  </header>

  <div id="tipbar" class="tipbar">点中刚冒头的角色容易触发暴击。空挥会断连击。</div>

  <section class="hud" aria-label="游戏数据">
    <div class="stat"><span class="label">分数</span><span id="score" class="value">0</span></div>
    <div class="stat"><span class="label">时间</span><span id="timeText" class="value">45</span></div>
    <div id="comboBox" class="stat"><span class="label">连击</span><span id="combo" class="value">0</span></div>
    <div class="stat"><span class="label">最高</span><span id="best" class="value">0</span></div>
  </section>
  <div class="timebar" aria-label="剩余时间"><i id="timeFill"></i></div>

  <main id="stage" class="stage-card">
    <div id="field" class="field" aria-label="打地鼠区域"></div>
    <div id="stageMsg" class="stage-msg"></div>
    <div id="countdown" class="countdown"></div>
  </main>

  <footer class="controls">
    <button id="startBtn" class="start">开始游戏</button>
    <button id="difficultyBtn" class="ghost-btn">标准</button>
    <button id="rulesBtn" class="ghost-btn">玩法</button>
  </footer>
</div>

<div id="curtain" class="curtain">
  <div class="card">
    <h2 id="modalTitle">咬不动地鼠</h2>

  { id:'easy', name:'休闲', duration:60, spawn:760, visible:1350, ramp:220, max:2, multi:.9, missPenalty:0, critWindow:380, bonus:.09, desc:'节奏松一点，适合先熟悉手感。' },
  { id:'normal', name:'标准', duration:45, spawn:610, visible:1060, ramp:310, max:2, multi:1, missPenalty:0, critWindow:320, bonus:.11, desc:'推荐难度，连击和暴击都比较舒服。' },
  { id:'hard', name:'困难', duration:45, spawn:490, visible:850, ramp:330, max:3, multi:1.16, missPenalty:.5, critWindow:270, bonus:.13, desc:'冒头更短，空挥会轻微扣时间。' },
  { id:'hell', name:'炼狱', duration:40, spawn:390, visible:700, ramp:270, max:4, multi:1.36, missPenalty:1, critWindow:230, bonus:.15, desc:'多洞同场，连击断一次就很疼。' }
];

const field = document.getElementById('field');
const stage = document.getElementById('stage');
const scoreEl = document.getElementById('score');
const timeText = document.getElementById('timeText');
const comboEl = document.getElementById('combo');
const comboBox = document.getElementById('comboBox');
const bestEl = document.getElementById('best');
const timeFill = document.getElementById('timeFill');
const startBtn = document.getElementById('startBtn');
const difficultyBtn = document.getElementById('difficultyBtn');
const rulesBtn = document.getElementById('rulesBtn');
const pauseBtn = document.getElementById('pauseBtn');
const soundBtn = document.getElementById('soundBtn');
const fullBtn = document.getElementById('fullBtn');
const tipbar = document.getElementById('tipbar');
const curtain = document.getElementById('curtain');
const modalTitle = document.getElementById('modalTitle');
const modalText = document.getElementById('modalText');
const modalBtn = document.getElementById('modalBtn');
const previewImg = document.getElementById('previewImg');
const diffGrid = document.getElementById('diffGrid');
const resultPanel = document.getElementById('resultPanel');
const stageMsg = document.getElementById('stageMsg');
const countdown = document.getElementById('countdown');
const hammer = document.getElementById('hammer');

previewImg.src = frames[2].src;

const game = {
  state:'ready',
  paused:false,
  score:0,
  combo:0,
  maxCombo:0,
  hits:0,
  misses:0,
  shown:0,
  crits:0,
  best:Number(localStorage.getItem('biteproofBest') || 0),
  modeIndex:Number(localStorage.getItem('biteproofMode') || 1),
  timeLeft:45,
  timer:null,
  spawnTimer:null,
  audio:null,
  sound:localStorage.getItem('biteproofSound') !== 'off',
  feverUntil:0,
  lastTick:0,
  ended:false
};
const holes = [];

function buildField() {
  field.innerHTML = '';
  holes.length = 0;
  for (let i = 0; i < 9; i++) {
    const hole = document.createElement('button');
    hole.className = 'hole';
    hole.type = 'button';
    hole.setAttribute('aria-label', '洞口 ' + (i + 1));
    hole.innerHTML = '<span class="halo"></span><span class="well"></span><img class="mole" alt="" draggable="false"><span class="impact"></span><span class="points"></span><span class="grass"><i></i><i></i><i></i></span>';
    const obj = {
      el:hole,
      img:hole.querySelector('.mole'),
      points:hole.querySelector('.points'),
      up:false,
      hit:false,
      type:'normal',
      visibleUntil:0,
      fullAt:0,
      hideTimer:null,
      frameTimer:null
    };
    obj.img.src = frames[0].src;
    hole.addEventListener('pointerdown', event => handleHole(obj, event));
    field.appendChild(hole);
    holes.push(obj);
  }
}

function setFrame(hole, index) {
  hole.img.src = frames[index].src;
}

function animateFrames(hole, seq, speed, loop) {
  clearInterval(hole.frameTimer);
  let n = 0;
  setFrame(hole, seq[0]);
  hole.frameTimer = setInterval(() => {
    n += 1;
    if (n >= seq.length) {
      if (!loop) { clearInterval(hole.frameTimer); return; }
      n = 0;
    }
    setFrame(hole, seq[n]);
  }, speed);
}

function currentMode() { return modes[game.modeIndex] || modes[1]; }
function liveHoles() { return holes.filter(h => h.up && !h.hit).length; }
function now() { return performance.now(); }
function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function setTip(text) {
  tipbar.textContent = text;
}

function centerMessage(text) {
  stageMsg.textContent = text;
  stageMsg.classList.remove('show');
  void stageMsg.offsetWidth;
  stageMsg.classList.add('show');
}

function buildDifficultyCards() {
  diffGrid.innerHTML = '';
  modes.forEach((mode, index) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'diff-card' + (index === game.modeIndex ? ' active' : '');
    btn.innerHTML = '<b>' + mode.name + '</b><span>' + mode.duration + ' 秒，' + mode.desc + '</span>';
    btn.addEventListener('click', () => {
      if (game.state === 'playing' || game.state === 'countdown') {
        setTip('本局结束后才能调整难度。');
        return;
      }
      game.modeIndex = index;
      localStorage.setItem('biteproofMode', String(index));
      refreshDifficultyUI();
      setTip('已切换到 ' + mode.name + ' 难度。');
    });
    diffGrid.appendChild(btn);
  });
}

function refreshDifficultyUI() {
  const mode = currentMode();
  difficultyBtn.textContent = mode.name;
  document.getElementById('subtitle').textContent = '当前难度：' + mode.name + '。暴击、连击和热潮都会加分。';
  Array.from(diffGrid.children).forEach((child, index) => child.classList.toggle('active', index === game.modeIndex));
  game.timeLeft = mode.duration;
  updateHud();
}

function resetGame() {
  const mode = currentMode();
  game.state = 'countdown';
  game.paused = false;
  game.score = 0;
  game.combo = 0;
  game.maxCombo = 0;
  game.hits = 0;
  game.misses = 0;
  game.shown = 0;
  game.crits = 0;
  game.timeLeft = mode.duration;
  game.feverUntil = 0;
  game.ended = false;
  clearInterval(game.timer);
  clearTimeout(game.spawnTimer);
  holes.forEach(forceHideMole);
  pauseBtn.textContent = '暂停';
  startBtn.textContent = '重新开始';
  stage.classList.remove('fever');
  updateHud();
}

function startGame() {
  unlockAudio();
  resetGame();
  curtain.classList.add('hidden');
  setTip('准备，盯住洞口边缘的动静。');
  playStart();
  runCountdown(['3','2','1','开始'], beginGame);
}

function runCountdown(items, done) {
  let i = 0;
  function step() {
    countdown.textContent = items[i];
    countdown.classList.remove('show');
    void countdown.offsetWidth;
    countdown.classList.add('show');
    i += 1;
    if (i >= items.length) {
      setTimeout(() => {
        countdown.classList.remove('show');
        countdown.style.display = 'none';
        done();
      }, 520);
    } else {
      setTimeout(step, 620);
    }
  }
  countdown.style.display = 'block';
  step();
}

function beginGame() {
  game.state = 'playing';
  game.paused = false;
  game.lastTick = now();
  setTip('开打。快打有暴击，连击 8 以上会进入短暂热潮。');
  game.timer = setInterval(tick, 100);
  spawnLoop(160);
}

function tick() {
  if (game.state !== 'playing' || game.paused) return;
  const t = now();
  const delta = Math.min(300, t - game.lastTick) / 1000;
  game.lastTick = t;
  game.timeLeft = Math.max(0, game.timeLeft - delta);
  holes.forEach(hole => {
    if (hole.up && !hole.hit && t > hole.visibleUntil) {
      missMoleByTimeout(hole);
    }
  });
  if (game.feverUntil && t > game.feverUntil) {
    game.feverUntil = 0;
    stage.classList.remove('fever');
    setTip('热潮结束，继续稳住连击。');
  }
  updateHud();
  if (game.timeLeft <= 0) endGame();
}

function spawnLoop(delay) {
  clearTimeout(game.spawnTimer);
  game.spawnTimer = setTimeout(() => {
    if (game.state !== 'playing') return;
    if (!game.paused) {
      showMole();
      const progress = 1 - game.timeLeft / currentMode().duration;
      if (progress > .45 && Math.random() < .35) setTimeout(showMole, 120 + Math.random() * 90);
      if (progress > .78 && Math.random() < .26) setTimeout(showMole, 250 + Math.random() * 120);
    }
    const mode = currentMode();
    const progress = 1 - game.timeLeft / mode.duration;
    const fever = game.feverUntil > now();
    const next = Math.max(190, mode.spawn - progress * mode.ramp - (fever ? 110 : 0) + Math.random() * 180);
    spawnLoop(next);
  }, delay);
}

function showMole() {
  if (game.state !== 'playing' || game.paused) return;
  const mode = currentMode();
  const progress = 1 - game.timeLeft / mode.duration;
  const fever = game.feverUntil > now();
  const allowed = Math.min(5, mode.max + (progress > .6 ? 1 : 0) + (fever ? 1 : 0));
  if (liveHoles() >= allowed) return;
  const free = holes.filter(h => !h.up && !h.hit);
  if (!free.length) return;
  const hole = randomItem(free);
  const isBonus = Math.random() < Math.min(.24, mode.bonus + game.combo * .004);
  const visible = Math.max(420, mode.visible - progress * mode.ramp - (fever ? 100 : 0) + Math.random() * 220);
  hole.up = true;
  hole.hit = false;
  hole.type = isBonus ? 'bonus' : 'normal';
  hole.visibleUntil = now() + visible;
  hole.fullAt = 0;
  game.shown += 1;
  clearTimeout(hole.hideTimer);
  clearInterval(hole.frameTimer);
  hole.el.classList.remove('hit', 'up', 'sink', 'bonus');
  hole.el.classList.add('peek');
  if (isBonus) hole.el.classList.add('bonus');
  animateFrames(hole, peekFrames, 70, false);
  setTimeout(() => {
    if (!hole.up || hole.hit || game.paused || game.state !== 'playing') return;
    hole.fullAt = now();
    hole.el.classList.remove('peek');
    hole.el.classList.add('up');
    animateFrames(hole, idleFrames, isBonus ? 118 : 150, true);
  }, 120);
}

function missMoleByTimeout(hole) {
  if (!hole.up || hole.hit) return;
  if (game.combo > 0) {
    game.combo = 0;
    setTip('目标缩回去了，连击归零。');
    centerMessage('连击断了');
  }
  sinkMole(hole);
  updateHud();
}

function sinkMole(hole) {
  clearInterval(hole.frameTimer);
  clearTimeout(hole.hideTimer);
  hole.el.classList.remove('peek', 'up', 'hit');
  hole.el.classList.add('sink');
  animateFrames(hole, sleepFrames, 95, false);
  hole.hideTimer = setTimeout(() => forceHideMole(hole), 180);
}

function forceHideMole(hole) {
  hole.up = false;
  hole.hit = false;
  hole.type = 'normal';
  hole.visibleUntil = 0;
  hole.fullAt = 0;
  clearTimeout(hole.hideTimer);
  clearInterval(hole.frameTimer);
  hole.el.classList.remove('peek', 'up', 'hit', 'sink', 'bonus');
  setFrame(hole, 0);
}

function handleHole(hole, event) {
  if (game.state !== 'playing' || game.paused) return;
  event.preventDefault();
  moveHammer(event, true);
  if (hole.up && !hole.hit) {
    hitMole(hole, event);
  } else {
    missTap();
  }
}

function hitMole(hole) {
  const mode = currentMode();
  const t = now();
  const reaction = hole.fullAt ? t - hole.fullAt : 999;
  const wasCombo = game.combo;
  const crit = hole.type === 'bonus' || reaction <= mode.critWindow;
  const base = hole.type === 'bonus' ? 18 : 10;
  const comboMultiplier = 1 + Math.min(wasCombo, 24) * .07;
  const critMultiplier = crit ? 2 : 1;
  const points = Math.max(1, Math.round(base * comboMultiplier * critMultiplier * mode.multi));
  hole.hit = true;
  hole.up = false;
  clearInterval(hole.frameTimer);
  clearTimeout(hole.hideTimer);
  hole.el.classList.remove('peek');
  hole.el.classList.add('up', 'hit');
  game.score += points;
  game.combo += 1;
  game.hits += 1;
  game.maxCombo = Math.max(game.maxCombo, game.combo);
  if (crit) game.crits += 1;
  showPoints(hole, points, crit, game.combo);
  animateFrames(hole, hitFrames, 56, false);
  playHit(crit);
  vibrate(crit ? [12, 20, 16] : 14);
  if (crit && game.combo >= 3) setTip('暴击命中，连击 x' + game.combo + '。');
  else if (crit) setTip('暴击，手速很准。');
  else if (game.combo >= 4) setTip('连击 x' + game.combo + '，分数倍率正在抬升。');
  else setTip('命中。继续追下一只。');
  if (game.combo === 5) centerMessage('连击 x5');
  if (game.combo === 8) startFever();
  if (game.combo > 0 && game.combo % 12 === 0) centerMessage('连击 x' + game.combo);
  updateHud();
  hole.hideTimer = setTimeout(() => forceHideMole(hole), 420);
}

function missTap() {
  const mode = currentMode();
  game.misses += 1;
  if (game.combo > 0) {
    game.combo = 0;
    centerMessage('空挥断连');
  }
  if (mode.missPenalty) {
    game.timeLeft = Math.max(0, game.timeLeft - mode.missPenalty);
    setTip('空挥，扣 ' + mode.missPenalty + ' 秒。稳一点。');
  } else {
    setTip('空挥，连击断了。等角色真正冒出来再点。');
  }
  playMiss();
  vibrate(8);
  stage.classList.remove('shake');
  void stage.offsetWidth;
  stage.classList.add('shake');
  updateHud();
}

function showPoints(hole, points, crit, combo) {
  let text = '+' + points;
  if (crit) text = '暴击 +' + points;
  else if (combo >= 5) text = '连击 +' + points;
  hole.points.textContent = text;
  hole.points.classList.toggle('crit', crit);
  hole.points.classList.toggle('combo', !crit && combo >= 5);
  hole.points.classList.remove('show');
  void hole.points.offsetWidth;
  hole.points.classList.add('show');
}

function startFever() {
  game.feverUntil = now() + 6000;
  stage.classList.add('fever');
  centerMessage('连击热潮');
  setTip('热潮开启，短时间内会更快出洞。');
  playFever();
}

function updateHud() {
  const mode = currentMode();
  scoreEl.textContent = String(game.score);
  timeText.textContent = String(Math.ceil(game.timeLeft));
  comboEl.textContent = String(game.combo);
  bestEl.textContent = String(game.best);
  comboBox.classList.toggle('combo-hot', game.combo >= 4);
  const scale = mode.duration ? Math.max(0, Math.min(1, game.timeLeft / mode.duration)) : 1;
  timeFill.style.transform = 'scaleX(' + scale + ')';
}

function endGame() {
  if (game.ended) return;
  game.ended = true;
  game.state = 'ended';
  game.paused = false;
  clearInterval(game.timer);
  clearTimeout(game.spawnTimer);
  holes.forEach(forceHideMole);
  stage.classList.remove('fever');
  startBtn.textContent = '再玩一局';
  const isRecord = game.score > game.best;
  if (isRecord) {
    game.best = game.score;
    localStorage.setItem('biteproofBest', String(game.best));
  }
  updateHud();
  const accuracy = game.hits + game.misses ? Math.round(game.hits / (game.hits + game.misses) * 100) : 0;
  modalTitle.textContent = isRecord ? '新纪录' : '本局结束';
  modalText.textContent = makeResultText(accuracy);
  previewImg.src = frames[4].src;
  resultPanel.hidden = false;
  resultPanel.innerHTML = '<div><small>命中率</small><strong>' + accuracy + '%</strong></div><div><small>最高连击</small><strong>' + game.maxCombo + '</strong></div><div><small>暴击</small><strong>' + game.crits + '</strong></div>';
  diffGrid.hidden = false;
  buildDifficultyCards();
  modalBtn.textContent = '再玩一局';
  curtain.classList.remove('hidden');
}

function makeResultText(accuracy) {
  if (game.score <= 0) return '这局还没开锅。换个难度或重新开局，先把节奏找回来。';
  if (game.maxCombo >= 20) return '得分 ' + game.score + '，最高分 ' + game.best + '。最高连击 ' + game.maxCombo + '，这局已经有点像手指在走钢丝。';
  if (accuracy >= 80) return '得分 ' + game.score + '，最高分 ' + game.best + '。命中率很稳，可以试试更高难度。';
  return '得分 ' + game.score + '，最高分 ' + game.best + '。命中率 ' + accuracy + '%，少空挥会让连击涨得更快。';
}

function togglePause() {
  if (game.state !== 'playing') return;
  game.paused = !game.paused;
  pauseBtn.textContent = game.paused ? '继续' : '暂停';
  if (game.paused) {
    clearTimeout(game.spawnTimer);
    holes.forEach(h => { clearInterval(h.frameTimer); clearTimeout(h.hideTimer); });
    centerMessage('已暂停');
    setTip('游戏暂停中。点继续恢复。');
  } else {
    game.lastTick = now();
    holes.filter(h => h.up && !h.hit).forEach(h => {
      h.visibleUntil = now() + 650;
      animateFrames(h, idleFrames, 150, true);
    });
    setTip('继续。屏幕已经重新接管节奏。');
    spawnLoop(220);
  }
}

function openRules() {
  if (game.state === 'playing' || game.state === 'countdown') {
    setTip('玩法：快打暴击，连续命中加倍率，连击 8 开热潮。');
    return;
  }
  resultPanel.hidden = true;
  diffGrid.hidden = false;
  modalTitle.textContent = '玩法和难度';
  modalText.textContent = '快打刚冒头的角色会触发暴击。连续命中会提升得分倍率，连击 8 会开启短暂热潮。困难和炼狱下，空挥会扣时间。选好难度后直接开局。';
  previewImg.src = frames[2].src;
  buildDifficultyCards();
  modalBtn.textContent = '开始游戏';
  curtain.classList.remove('hidden');
}

function unlockAudio() {
  if (!game.audio) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) game.audio = new AudioContext();
  }
  if (game.audio && game.audio.state === 'suspended') game.audio.resume();
}

function tone(freq, duration, type, gain, start) {
  if (!game.sound || !game.audio) return;
  const ctx = game.audio;
  const osc = ctx.createOscillator();
  const amp = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime + (start || 0));
  amp.gain.setValueAtTime(0, ctx.currentTime + (start || 0));
  amp.gain.linearRampToValueAtTime(gain || .05, ctx.currentTime + (start || 0) + .012);
  amp.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + (start || 0) + duration);
  osc.connect(amp).connect(ctx.destination);
  osc.start(ctx.currentTime + (start || 0));
  osc.stop(ctx.currentTime + (start || 0) + duration + .03);
}

function playHit(crit) {
  tone(crit ? 760 : 620, .09, 'triangle', .065);
  tone(crit ? 1180 : 920, .12, 'sine', .045, .04);
  if (crit) tone(1480, .09, 'triangle', .035, .08);
}
function playMiss() { tone(120, .08, 'square', .032); }
function playStart() { tone(420, .08, 'triangle', .04); tone(650, .11, 'triangle', .04, .08); }
function playFever() { tone(520, .08, 'triangle', .04); tone(780, .08, 'triangle', .04, .07); tone(1040, .12, 'triangle', .04, .14); }
function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

function moveHammer(event, strike) {
  const x = (event.clientX || 0) - 16;
  const y = (event.clientY || 0) - 48;
  hammer.style.setProperty('--x', x + 'px');
  hammer.style.setProperty('--y', y + 'px');
  hammer.style.transform = 'translate(' + x + 'px, ' + y + 'px) rotate(-28deg)';
  hammer.classList.add('show');
  if (strike) {
    hammer.classList.remove('strike');
    void hammer.offsetWidth;
    hammer.classList.add('strike');
  }
  clearTimeout(moveHammer.t);
  moveHammer.t = setTimeout(() => hammer.classList.remove('show'), 700);
}

function toggleFullscreen() {
  const root = document.documentElement;
  if (!document.fullscreenElement && root.requestFullscreen) {
    root.requestFullscreen().catch(() => setTip('当前浏览器没有允许全屏。'));
  } else if (document.exitFullscreen) {
    document.exitFullscreen();
  }
}

window.addEventListener('pointermove', e => {
  if (matchMedia('(hover:hover)').matches) moveHammer(e, false);
}, { passive:true });

startBtn.addEventListener('click', startGame);
modalBtn.addEventListener('click', startGame);
pauseBtn.addEventListener('click', togglePause);
rulesBtn.addEventListener('click', openRules);
difficultyBtn.addEventListener('click', openRules);
fullBtn.addEventListener('click', toggleFullscreen);
soundBtn.addEventListener('click', () => {
  game.sound = !game.sound;
  soundBtn.textContent = game.sound ? '音效开' : '音效关';
  localStorage.setItem('biteproofSound', game.sound ? 'on' : 'off');
  unlockAudio();
  setTip(game.sound ? '音效已开启。' : '音效已关闭。');
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && game.state === 'playing' && !game.paused) togglePause();
});

buildField();
buildDifficultyCards();
refreshDifficultyUI();
soundBtn.textContent = game.sound ? '音效开' : '音效关';
bestEl.textContent = String(game.best);
modalBtn.textContent = '开始游戏';
</script>
</body>
